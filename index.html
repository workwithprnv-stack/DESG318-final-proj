<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Android App</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <div class="app-container">

                <!-- SCROLLABLE APP -->
                <div class="app-scroll" id="appScroll">

                    <!-- HOME PAGE -->
                    <div id="homePage">
                        <!-- TOP BAR -->
                        <div class="top-bar">
                            <div class="top-bar-row1">
                                <div class="logo-txt">amazon<span>.in</span></div>
                                <div class="deliver-chip">Deliver to <b>Mumbai</b> 400001</div>
                                <div class="top-icons">
                                    <div class="top-icon" onclick="showPage('cart')"><i class="fas fa-shopping-cart"></i><div class="badge-dot" id="cartBadge">0</div></div>
                                    <div class="top-icon"><i class="fas fa-bars"></i></div>
                                </div>
                            </div>
                            <div class="search-row" onclick="focusSearch()">
                                <i class="fas fa-search" style="color:#888;font-size:14px"></i>
                                <input id="searchBox" placeholder="Search Amazon.in" style="font-size:14px" onkeydown="if(event.key==='Enter')doSearch()">
                                <span class="search-icon" onclick="doSearch()"><i class="fas fa-search"></i></span>
                            </div>
                        </div>

                        <!-- CAT TABS -->
                        <div class="cat-tabs" id="catTabs">
                            <div class="cat-tab active" onclick="setTab(this,'All')">All</div>
                            <div class="cat-tab" onclick="setTab(this,'Electronics')">Electronics</div>
                            <div class="cat-tab" onclick="setTab(this,'Fashion')">Fashion</div>
                            <div class="cat-tab" onclick="setTab(this,'Home')">Home</div>
                            <div class="cat-tab" onclick="setTab(this,'Books')">Books</div>
                            <div class="cat-tab" onclick="setTab(this,'Sports')">Sports</div>
                            <div class="cat-tab" onclick="setTab(this,'Toys')">Toys</div>
                            <div class="cat-tab" onclick="setTab(this,'Beauty')">Beauty</div>
                        </div>

                        <!-- BANNER -->
                        <div class="banner" id="heroBanner">
                            <div class="banner-content">
                                <h3 id="bannerTitle">Electronics Sale</h3>
                                <p id="bannerSub">Up to 40% off on gadgets</p>
                                <button class="banner-btn" id="bannerBtn" onclick="bannerClick()">Shop Now</button>
                                <div class="banner-dots">
                                    <div class="bdot a" id="bd0"></div>
                                    <div class="bdot" id="bd1"></div>
                                    <div class="bdot" id="bd2"></div>
                                    <div class="bdot" id="bd3"></div>
                                </div>
                            </div>
                            <div class="banner-emoji" id="bannerEmoji"><i class="fas fa-mobile-alt"></i></div>
                        </div>

                        <!-- CATEGORIES -->
                        <div class="sec-hdr">
                            <h4>Shop by category</h4>
                            <a>See all</a>
                        </div>
                        <div class="cat-icons">
                            <div class="cat-icon-item" onclick="filterCat('Electronics')">
                                <div class="cat-circle" style="background:#E3F2FD"><i class="fas fa-laptop"></i></div>
                                <span>Electronics</span>
                            </div>
                            <div class="cat-icon-item" onclick="filterCat('Fashion')">
                                <div class="cat-circle" style="background:#FCE4EC"><i class="fas fa-tshirt"></i></div>
                                <span>Fashion</span>
                            </div>
                            <div class="cat-icon-item" onclick="filterCat('Home')">
                                <div class="cat-circle" style="background:#E8F5E9"><i class="fas fa-home"></i></div>
                                <span>Home</span>
                            </div>
                            <div class="cat-icon-item" onclick="filterCat('Books')">
                                <div class="cat-circle" style="background:#FFF3E0"><i class="fas fa-book"></i></div>
                                <span>Books</span>
                            </div>
                            <div class="cat-icon-item" onclick="filterCat('Sports')">
                                <div class="cat-circle" style="background:#F3E5F5"><i class="fas fa-basketball-ball"></i></div>
                                <span>Sports</span>
                            </div>
                            <div class="cat-icon-item" onclick="filterCat('Toys')">
                                <div class="cat-circle" style="background:#E0F7FA"><i class="fas fa-cube"></i></div>
                                <span>Toys</span>
                            </div>
                            <div class="cat-icon-item" onclick="filterCat('Beauty')">
                                <div class="cat-circle" style="background:#FBE9E7"><i class="fas fa-spa"></i></div>
                                <span>Beauty</span>
                            </div>
                            <div class="cat-icon-item" onclick="filterCat('Grocery')">
                                <div class="cat-circle" style="background:#E8F5E9"><i class="fas fa-shopping-basket"></i></div>
                                <span>Grocery</span>
                            </div>
                        </div>

                        <!-- DEALS -->
                        <div class="sec-hdr">
                            <h4 id="dealsTitle">Today's deals</h4>
                            <a onclick="filterCat('All')">See all</a>
                        </div>
                        <div class="deals-row" id="dealsRow"></div>

                        <!-- PRODUCTS -->
                        <div class="sec-hdr">
                            <h4 id="prodTitle">Recommended for you</h4>
                        </div>
                        <div class="product-list" id="prodList"></div>
                    </div>

                    <!-- PRODUCT DETAIL PAGE -->
                    <div id="detailPage" style="display:none">
                        <div class="pd-topbar">
                            <div class="pd-back" onclick="goHome()"><i class="fas fa-arrow-left"></i></div>
                            <input class="pd-search" placeholder="Search Amazon.in" value="">
                            <div class="pd-icons">
                                <span style="color:#fff;font-size:18px;cursor:pointer" onclick="showPage('cart')"><i class="fas fa-shopping-cart"></i></span>
                                <span style="color:#fff;font-size:18px;cursor:pointer"><i class="fas fa-ellipsis-v"></i></span>
                            </div>
                        </div>
                        <div id="pdContent"></div>
                    </div>

                    <!-- CART PAGE -->
                    <div id="cartPage" style="display:none">
                        <div class="cart-topbar">
                            <div class="pd-back" onclick="goHome()" style="color:#fff;font-size:20px;cursor:pointer"><i class="fas fa-arrow-left"></i></div>
                            <div class="cart-topbar-title">My Cart (<span id="cartCountH">0</span>)</div>
                        </div>
                        <div class="cart-body" id="cartBody"></div>
                    </div>

                </div>

                <!-- BOTTOM NAV -->
                <div class="bottom-nav">
                    <button class="nav-btn active" id="navHome" onclick="goHome();setNav('navHome')">
                        <span class="n-icon"><i class="fas fa-home"></i></span>
                        <span class="n-label">Home</span>
                    </button>
                    <button class="nav-btn" id="navSearch" onclick="setNav('navSearch')">
                        <span class="n-icon"><i class="fas fa-search"></i></span>
                        <span class="n-label">Search</span>
                    </button>
                    <button class="nav-btn" id="navCart" onclick="showPage('cart');setNav('navCart')">
                        <span class="n-icon"><i class="fas fa-shopping-cart"></i></span>
                        <span class="n-label">Cart</span>
                    </button>
                    <button class="nav-btn" id="navAccount" onclick="setNav('navAccount')">
                        <span class="n-icon"><i class="fas fa-user"></i></span>
                        <span class="n-label">Account</span>
                    </button>
                </div>

                <!-- HOME INDICATOR -->
                <div class="home-indicator">
                    <div class="home-bar"></div>
                </div>

                <!-- TOAST -->
                <div class="toast-r" id="toastR"></div>

            </div>

    <script src="assets/js/app.js"></script>
</body>
</html>
